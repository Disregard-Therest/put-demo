<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="«Путь» — интерактивный прототип приложения: погода жизни, ежедневные практики и проводник Компас.">
  <meta name="theme-color" content="#07060f">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Путь">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Путь · демо-прототип</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 35%, #14102a 0%, #07060f 70%);
      transition: opacity .45s ease;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash svg { animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .92; }
      50% { transform: scale(1.07); opacity: 1; }
    }
    #splash .name {
      margin-top: 22px;
      color: #ece7f6;
      font-size: 26px;
      letter-spacing: 10px;
      padding-left: 10px; /* компенсация letter-spacing последней буквы */
      font-weight: 600;
    }
    #splash .hint {
      margin-top: 14px;
      color: #9b90bd;
      font-size: 13px;
      letter-spacing: .4px;
    }
  </style>
</head>
<body style="margin:0;background:#07060f">
  <div id="splash">
    <svg width="96" height="96" viewBox="0 0 96 96">
      <polygon points="48,8 54,42 88,48 54,54 48,88 42,54 8,48 42,42"
               fill="#8a6bd6" opacity="0.45" transform="rotate(45 48 48)"/>
      <polygon points="48,4 55,41 92,48 55,55 48,92 41,55 4,48 41,41" fill="#d9b26a"/>
      <circle cx="48" cy="48" r="4" fill="#e7cf9c"/>
    </svg>
    <div class="name">ПУТЬ</div>
    <div class="hint">готовим вашу погоду…</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      s.classList.add('hidden');
      setTimeout(function () { s.remove(); }, 600);
    });
    // Страховка: если событие не пришло, не держим человека на сплэше вечно.
    setTimeout(function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(function () { s.remove(); }, 600); }
    }, 20000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
